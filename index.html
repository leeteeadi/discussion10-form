<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Interest Form</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <form action="https://formspree.io/f/mnjgwled" method="POST">
    <fieldset>
      <legend>Travel Form</legend>

      <label for="first-name">First Name: <span aria-hidden="true">*</span></label>
      <input type="text" id="first-name" name="first-name" required>

      <label for="last-name">Last Name: <span aria-hidden="true">*</span></label>
      <input type="text" id="last-name" name="last-name" required>

      <label for="email">Email Address: <span aria-hidden="true">*</span></label>
      <input type="email" id="email" name="email" required>

      <label for="destination">Dream Destination:</label>
      <input type="text" id="destination" name="destination">

      <label for="travel-password">Travel Account Password:</label>
      <input type="password" id="travel-password" name="travel-password">

      <label for="portfolio">Travel Blog / Favorite Travel Website:</label>
      <input type="url" id="portfolio" name="portfolio">

      <label for="departure-date">Preferred Departure Date:</label>
      <input type="date" id="departure-date" name="departure-date">

      <fieldset class="radio-group">
        <legend>Preferred Travel Season: <span aria-hidden="true">*</span></legend>

        <input type="radio" id="spring" name="travel-season" value="spring" required>
        <label for="spring">Spring</label>

        <input type="radio" id="summer" name="travel-season" value="summer">
        <label for="summer">Summer</label>

        <input type="radio" id="fall" name="travel-season" value="fall">
        <label for="fall">Fall</label>

        <input type="radio" id="winter" name="travel-season" value="winter">
        <label for="winter">Winter</label>
      </fieldset>

      <input type="submit" value="Submit">
    </fieldset>
  </form>

</body>
</html>
